<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grocerymart</title>
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="./assets/favicon/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="./assets/favicon/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="./assets/favicon/apple-touch-icon.png" />
    <link rel="manifest" href="./assets/favicon/site.webmanifest" />
    <!-- Font -->
    <link rel="stylesheet" href="./assets/fonts/stylesheet.css">
    <!-- Bootstrap icon -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.price.css">
    <!-- CSS -->
    <link rel="stylesheet" href="./assets/css/main.css">

    <style>
        .filter-box {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
    </style>
</head>

<body>
    <div class="filter-box">
        <h2 class="filter-name text-md-22">Filter</h2>
        <h2 class="filter__title text-md-22">Price</h2>
        <div class="filter__control-bar">
            <div class="filter__circle"></div>
            <div class="filter__circle"></div>
        </div>
        <div class="filter__price-control">
            <from class="filter__price-box">
                <span class="filter__price-dollar">$</span>
                <label for="minimum" class="filter__price-label text-md-14">Minimum</label>
                <input type="text" name="minimum" id="minimum" class="filter__price-input" placeholder="30.00">
            </from>
            <div class="filter__price-box">
                <span class="filter__price-dollar">$</span>
                <label for="maximum" class="filter__price-label text-md-14">Maximum</label>
                <input type="text" name="maximum" id="maximum" class="filter__price-input" placeholder="100.00">
            </div>
        </div>
        <div class="filter__line"></div>
    </div>
</body>

</html>
